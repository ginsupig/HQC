# Candidate-pair research campaign config.
# This file is intentionally separate from config/pairs.yaml so research
# candidates cannot be promoted into the live basket accidentally.

campaign:
  output_dir: state/pairs_campaign
  # Pre-registered family = the 4 discovery survivors validated below. These were
  # surfaced by tools/research_all.py (2026-06, ~65 pairs screened across 9
  # sector universes). Per the B-flow, B1->B2->B3 is the screen and this campaign
  # is the confirmation on survivors. Honesty note: because the screen tested ~65
  # pairs, only DUK/EXC (raw_p~0.0004) clears a strict full-screen Bonferroni
  # (0.05/65=0.00077); the rest lean on the smaller confirmation family. Read the
  # corrected verdicts with that in mind.
  pre_registered_family_size: 4
  alpha: 0.05
  bootstrap: 10000
  train_days: 30
  test_days: 10
  initial_capital: 100000
  sim_max_hold_minutes: 240
  slippage_bps_per_side: 1.5
  sec_fee_rate: 0.000008
  short_borrow_apr: 0.0025
  pair_entry_z: 1.5
  pair_exit_z: 0.4
  pair_delta: 1e-4
  pair_ve: 1e-3
  pair_max_leg_staleness_sec: 30.0
  pair_cooldown_seconds: 120.0
  pair_nominal_stop_pct: 0.02
  pair_target_dollar_notional: 10000.0
  # Auto-promotion of APPROVED pairs into the deploy config after the campaign.
  # Off by default; dry-run (write: false) when first enabled so a human sees the
  # diff before it touches config/pairs.yaml. CLI overrides: --promote (dry-run),
  # --promote-write (write), --no-promote.
  promotion:
    enabled: false
    write: false
    target: config/pairs.yaml
    keep_existing: false
    buying_power: 450000      # account buying power for the gross-exposure guard
    max_leverage: 3           # comfortable at 2-3x per the operator
    allow_empty: false

  gates:
    a2:
      enabled: true
      workers: 1
      smoke: false
    a3:
      enabled: true
      workers: 1
    a4:
      enabled: true
      workers: 1
      spy_csv: data/alpaca/spy_730d_1m.csv
      spy_symbol: SPY
    d3:
      enabled: true
      workers: 1

# Discovery survivors (research_all 2026-06). Leg order (y/x) matches B1's
# alphabetical convention — the SAME orientation discovery scored, which matters
# because the Kalman fit y=beta*x is direction-sensitive. Discovery raw_p (b3,
# UNCORRECTED, pre-full-gates) noted per pair; the campaign re-validates with the
# full A2/A3/A4/D3 gates + pair-family correction.
#
# The previous 7 textbook pairs (JPM/BAC, C/WFC, USB/PNC, V/MA, MSFT/AAPL,
# XOM/CVX, KO/PEP) were all REJECTED on 730d data (see git history / state/) and
# are removed from the active family. JPM/BAC remains demoted in config/pairs.yaml.
pairs:
  - y: DUK
    x: EXC
    csv_y: data/alpaca/duk_730d_1m.csv
    csv_x: data/alpaca/exc_730d_1m.csv
    thesis: "Regulated-utility pair (discovery raw_p~0.0004 — survives even a strict 0.05/65 screen correction; small but highly consistent edge. A3 cost-stress is the key test given tight spread)."

  - y: PNC
    x: USB
    csv_y: data/alpaca/pnc_730d_1m.csv
    csv_x: data/alpaca/usb_730d_1m.csv
    thesis: "Regional-bank pair (discovery raw_p~0.0038, ~0.2%/window — best economics). NOTE: this is USB/PNC with the legs FLIPPED; the y=USB orientation scored raw_p~0.5 in the prior campaign, so confirm the direction asymmetry is real, not luck."

  - y: COP
    x: SLB
    csv_y: data/alpaca/cop_730d_1m.csv
    csv_x: data/alpaca/slb_730d_1m.csv
    thesis: "Energy E&P vs oilfield-services (discovery raw_p~0.037 — borderline; likely fails pair-family correction, included to map the boundary)."

  - y: AVGO
    x: MRVL
    csv_y: data/alpaca/avgo_730d_1m.csv
    csv_x: data/alpaca/mrvl_730d_1m.csv
    thesis: "Semiconductor pair (discovery raw_p~0.069, ~0.3%/window — largest magnitude but p>0.05; included as a high-magnitude longshot to see if the full gates tighten or loosen it)."
