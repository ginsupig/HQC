# Kalman pairs deployment config.
#
# A1 multiple-comparisons audit (docs/A1_multiple_comparisons.md) re-scored
# the family of 6+ pair tests this codebase has run. Verdict:
#   JPM/BAC      : raw p=0.007. Survives Bonferroni at the strict family
#                  interpretation (n=6, threshold 0.00833) by 0.0013; FAILS
#                  at the inclusive interpretation (n=8) that counts the
#                  KO/PEP and XOM/CVX entry_z retries. Status: deployed
#                  marginally; A2 (parameter sensitivity) is the gating
#                  prerequisite to confirm the edge is a plateau and not
#                  a knife-edge artifact at (1.5, 0.4). Do not add new
#                  pairs until A2 is green for this one.
#   GOOG/GOOGL   : raw p=0.031. FAILS both Bonferroni and BH-FDR at any
#                  family size considered. Demoted from the deployed
#                  basket until more OOS data tightens the CI. The
#                  block below is commented out, not deleted, so it is
#                  one-line re-enabled once the corrected significance
#                  bar is cleared.
#
# To start in paper mode against Alpaca, set environment first:
#   ALPACA_API_KEY=...
#   ALPACA_API_SECRET=...
# then:
#   python main_pairs.py --config config/pairs.yaml
#
# To deploy LIVE (real money) you must set BOTH:
#   paper: false      (here)
#   HQC_ENABLE_LIVE_TRADING=1   (env)
# Otherwise the runtime refuses to start. Don't disable that gate without
# 30 days of clean paper-trading evidence.

paper: true
feed: iex     # IEX is free; switch to "sip" only if your Alpaca plan covers it.

pairs:
  - y: JPM
    x: BAC
    entry_z: 1.5
    exit_z: 0.4
    cooldown_seconds: 120
    nominal_stop_pct: 0.02
    target_dollar_notional: 10000

  # GOOG/GOOGL — DEMOTED by A1 multiple-comparisons audit (2026-05-25).
  # Raw p=0.031 does not survive correction at family size >= 2. Re-enable
  # only after (a) more OOS windows tighten the CI below the corrected
  # threshold for the then-current family, or (b) the pair is re-validated
  # in a pre-registered, family-sized study.
  # - y: GOOG
  #   x: GOOGL
  #   entry_z: 1.5
  #   exit_z: 0.4
  #   cooldown_seconds: 120
  #   nominal_stop_pct: 0.02
  #   target_dollar_notional: 10000

risk:
  initial_capital: 100000
  daily_loss_pct_kill: 0.02       # Halt today if cumulative -2% drawdown.
  beta_drift_pct_kill: 0.30       # Halt a pair if Kalman beta drifts >30% from rolling mean.
  beta_drift_window_min: 60       # Rolling window for the baseline.
