# Kalman pairs deployment config.
#
# Deployment verdict (updated 2026-06-09):
#   Basket HELD EMPTY by operator choice. PNC/USB cleared the full confirmation
#   campaign (raw_p=0.0050 < 0.05/4, mean +0.177%/window, all gates PASS) and is
#   ready as a commented one-line re-enable below — but rather than deploy a
#   single pair (zero diversification), discovery was widened first (+7 stat-arb
#   clusters: regional banks, insurance, REITs, materials, managed care,
#   payments, transports — 100->169 tickers). Deploy a diversified basket once
#   that search surfaces additional APPROVED pairs.
#
#   Honesty note carried forward: PNC/USB clears 0.05/4 but the screen was wide
#   (~65 pairs; strict 0.05/65=0.00077 clears nothing). The family-sized
#   confirmation is the agreed methodology — keep it when promoting new survivors.
#
#   Demoted pairs (JPM/BAC, GOOG/GOOGL) remain commented below for one-line
#   re-enable if a future window tightens their raw_p below the then-current bar.
#
# Ideally regenerate this file via the selection->deploy bridge so the full
# ranking provenance + an independent strict re-check are applied:
#   python tools/promote_pairs.py --campaign-config config/pairs_research.yaml --write
#
# To start in paper mode against Alpaca, set environment first:
#   ALPACA_API_KEY=...
#   ALPACA_API_SECRET=...
# then:
#   python main_pairs.py --config config/pairs.yaml
#
# To deploy LIVE (real money) you must set BOTH:
#   paper: false      (here)
#   HQC_ENABLE_LIVE_TRADING=1   (env)
# Otherwise the runtime refuses to start. Don't disable that gate without
# 30 days of clean paper-trading evidence.

paper: true
feed: iex     # IEX is free; switch to "sip" only if your Alpaca plan covers it.

# Basket HELD EMPTY (2026-06-09). PNC/USB passed the campaign (see below) but the
# operator chose to widen discovery first (+7 stat-arb clusters, 100->169 tickers)
# and deploy a diversified multi-pair basket rather than a single pair. main_pairs.py
# refuses to start with no pairs — that is the intended "paused" state. Re-enable
# PNC/USB (uncomment) and/or add the new survivors once the wider search completes.
pairs: []

  # PNC/USB — APPROVED by the 2026-06-09 discovery campaign; HELD pending a wider
  # basket (single-pair = zero diversification). One-line re-enable: uncomment.
  #   raw_p=0.0050  mean=+0.177%/window  bonferroni_threshold=0.0125 (0.05/4)
  #   gates: A2=PASS A3=PASS A4=PASS D3=PASS
  #   Leg orientation PNC(y)/USB(x) is load-bearing — flipped USB/PNC was p~0.5.
  # - y: PNC
  #   x: USB
  #   entry_z: 1.5
  #   exit_z: 0.4
  #   cooldown_seconds: 120
  #   nominal_stop_pct: 0.02
  #   target_dollar_notional: 10000

  # JPM/BAC — DEMOTED by the 2026-06-03 pre-registered campaign re-validation.
  # On 730d data its walk-forward raw_p decayed to 0.0223, which FAILS the
  # pair-family correction (Bonferroni 0.05/7 = 0.0071; also fails BH-FDR).
  # Its A2 parameter surface is a genuine PLATEAU (12/12 deployed-slice cells
  # positive & raw-significant) — i.e. NOT a curve-fit spike — but a robust
  # surface does not rescue a pair that no longer clears the corrected
  # significance bar. The original p=0.007 edge has weakened on the current
  # 2-year window. Re-enable only if a future window tightens raw_p below the
  # then-current pair-family threshold.
  # - y: JPM
  #   x: BAC
  #   entry_z: 1.5
  #   exit_z: 0.4
  #   cooldown_seconds: 120
  #   nominal_stop_pct: 0.02
  #   target_dollar_notional: 10000

  # GOOG/GOOGL — DEMOTED by A1 multiple-comparisons audit (2026-05-25).
  # Raw p=0.031 does not survive correction at family size >= 2. Re-enable
  # only after (a) more OOS windows tighten the CI below the corrected
  # threshold for the then-current family, or (b) the pair is re-validated
  # in a pre-registered, family-sized study.
  # - y: GOOG
  #   x: GOOGL
  #   entry_z: 1.5
  #   exit_z: 0.4
  #   cooldown_seconds: 120
  #   nominal_stop_pct: 0.02
  #   target_dollar_notional: 10000

risk:
  initial_capital: 100000
  daily_loss_pct_kill: 0.02       # Halt today if cumulative -2% drawdown.
  beta_drift_pct_kill: 0.30       # Halt a pair if Kalman beta drifts >30% from rolling mean.
  beta_drift_window_min: 60       # Rolling window for the baseline.

# Portfolio-level sizing + exposure caps for a MULTI-pair basket. Off by
# default — with one pair it does nothing. When enabled, the BasketAllocator
# scales each pair's per-leg notional DOWN to fit equity x max_gross_leverage
# and caps per-symbol exposure (a hard pre-trade guarantee, since each pair
# trades a fixed notional); the PortfolioRiskMonitor enforces the caps and a
# real daily-PnL kill at runtime. The per-pair target_dollar_notional above is
# treated as the validated ceiling — allocation never sizes ABOVE it.
#
# portfolio:
#   enabled: true
#   equity: 450000          # account buying power (<=0 -> use risk.initial_capital)
#   max_gross_leverage: 3   # comfortable at 2-3x
#   max_symbol_pct: 0.5     # cap any single symbol at 50% of equity
#   min_notional: 100       # warn if a pair is sized below this
