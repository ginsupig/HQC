sector_etfs:
  # The sector SPDR family. All share ONE sector label ("SectorETF") on purpose:
  # B1 only pairs WITHIN a sector, so distinct per-ETF labels (the old
  # ETF_Financials/ETF_Technology/... scheme) left every ETF alone in its bucket
  # and produced zero candidate pairs. With a shared label B1 considers all
  # ETF×ETF combinations; its correlation filter then drops the unrelated ones
  # (XLE vs XLV) and keeps the economically linked ones (e.g. XLP/XLU defensives).
  - { ticker: XLF,  sector: SectorETF }
  - { ticker: XLK,  sector: SectorETF }
  - { ticker: XLE,  sector: SectorETF }
  - { ticker: XLV,  sector: SectorETF }
  - { ticker: XLI,  sector: SectorETF }
  - { ticker: XLY,  sector: SectorETF }
  - { ticker: XLP,  sector: SectorETF }
  - { ticker: XLU,  sector: SectorETF }
  - { ticker: XLB,  sector: SectorETF }
  - { ticker: XLRE, sector: SectorETF }
  - { ticker: XLC,  sector: SectorETF }

index_etfs:
  # Broad-market index ETFs. Mostly useful as overlap/correlation references
  # rather than as pairs (SPY vs IWM as a pair is just a beta trade).
  - { ticker: SPY, sector: Index }
  - { ticker: QQQ, sector: Index }
  - { ticker: IWM, sector: Index }
  - { ticker: DIA, sector: Index }
  - { ticker: VTI, sector: Index }
