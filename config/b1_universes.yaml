  # benchmark — if a sector-ETF pair shows edge, individual names in that
  # sector are more likely to as well.
  - { ticker: XLF,  sector: ETF_Financials }
  - { ticker: XLK,  sector: ETF_Technology }
  - { ticker: XLE,  sector: ETF_Energy }
  - { ticker: XLV,  sector: ETF_HealthCare }
