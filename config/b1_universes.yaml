# B1 — universe + GICS-sector mapping for pair-discovery clustering.
#
# Each universe is a list of (ticker, sector) entries. Sector labels are
# GICS-style ("Financials", "Information Technology", etc.) so the clustering
# step can use them as a hard partition (no cross-sector pairs by default —
# cross-sector cointegration is real but rare and usually overfits).
#
# Tickers MUST exist as <lowercase>_<days>d_1m.csv files under data/alpaca/
# (or whatever --data-dir is passed) for B1 to score them. Missing tickers
# are reported and skipped, not silently dropped — so the operator can decide
# whether to fetch them or shrink the universe.

deployed:
  # Sanity-check universe: the one pair currently deployed (per A1).
  - { ticker: JPM, sector: Financials }
  - { ticker: BAC, sector: Financials }

