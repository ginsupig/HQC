index_etfs:
  # Broad-market index ETFs. Mostly useful as overlap/correlation references
  # rather than as pairs (SPY vs IWM as a pair is just a beta trade).
  - { ticker: SPY, sector: Index }
  - { ticker: QQQ, sector: Index }
  - { ticker: IWM, sector: Index }
  - { ticker: DIA, sector: Index }
  - { ticker: VTI, sector: Index }
