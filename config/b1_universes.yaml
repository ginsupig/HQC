# ─────────────────────────────────────────────────────────────────────────────
# EXPANSION (2026-06-09): classic statistical-arb clusters that were missing.
# Each is a tight, single-driver group where cointegration is common and
# economically motivated (not a curve-fit). Every entry in a cluster shares ONE
# sector label so B1 considers all within-cluster combinations; B1's correlation
# filter then trims the unrelated ones. New tickers are auto-fetched by
# research_all.py (fetch_alpaca.py) on the next run — no manual download needed.
# ─────────────────────────────────────────────────────────────────────────────

